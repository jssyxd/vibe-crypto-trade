[run]
# Coverage configuration for Vibe-Crypto-Trading

# Source packages to measure coverage
source =
    .
    portfolio/
    execution/
    iteration/
    notifications/
    dashboard/

# Include patterns
include =
    */portfolio/*.py
    */execution/*.py
    */iteration/*.py
    */notifications/*.py
    */dashboard/*.py

# Exclude patterns (test files, config, etc.)
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */.venv/*
    */conftest.py
    run_*.py

# Branch coverage
branch = True

# Coverage report options
[report]
# Show line numbers with missing coverage
show_missing = True

# Skip coverage for lines with no code (docstrings, comments)
skip_empty = True

# Exclude common non-testable code
exclude_lines =
    # ReSPECTest configuration
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

# Format output
precision = 2
sort = Cover

[html]
# HTML report directory
directory = htmlcov

[xml]
# XML report for CI integration
output = coverage.xml

[lcov]
# LCOV report for CI integration
output = lcov.info

[paths]
# Alternate source paths for coverage
source =
    .
    /home/da/桌面/新建文件夹 2/vct-project