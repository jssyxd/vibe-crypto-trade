[pytest]
# Pytest configuration for Vibe-Crypto-Trading

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

# Markers for categorizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for component interactions
    e2e: End-to-end tests for complete trading flows
    slow: Tests that take longer to run
    async: Asynchronous tests
    live: Tests that require live exchange connections
    mock: Tests using mocks instead of real connections

# Asyncio configuration
asyncio_mode = auto

# Coverage configuration (when running with --cov)
# See coverage.ini for detailed coverage settings